name: LifeOS AI CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-codebase:
    name: Lint & Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-size: '20.x'
          node-version: '20'
          cache: 'npm'

      - name: Install Packages
        run: npm ci

      - name: Validate Express Server Syntax
        run: node --check server.js database.js ai-engine.js

  validate-docker:
    name: Verify Docker Container Build
    runs-on: ubuntu-latest
    needs: validate-codebase

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Docker Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: lifeos-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
